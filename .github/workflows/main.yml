name: Run Experiments

on:
  workflow_dispatch:

permissions:
  contents: read
  models: read

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show enabled models
        run: |
          python - <<'PY'
          import yaml
          from pathlib import Path

          config = yaml.safe_load(Path("config/models.yaml").read_text())
          for model in config["models"]:
              if model.get("enabled"):
                  print(f"- {model['name']} ({model['provider']})")
          PY

      - name: Run experiments
        run: python -m src.run_experiments

      - name: Print result summary
        if: always()
        run: |
          echo "=== model_comparison.csv ==="
          if [ -f results/model_comparison.csv ]; then
            cat results/model_comparison.csv
          else
            echo "model_comparison.csv not generated"
          fi

          echo ""
          echo "=== fallback/errors sample ==="
          if [ -f results/raw_results.csv ]; then
            grep "fallback\|ERRO\|429\|404" results/raw_results.csv | head -n 30 || true
          else
            echo "raw_results.csv not generated"
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-results
          path: results/
